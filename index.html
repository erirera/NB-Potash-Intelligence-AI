<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Brunswick Potash Explorer | Advanced Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Top Glass Header -->
  <header class="glass-header">
    <div class="header-content">
      <div class="logo-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
      </div>
      <div>
        <h1>NB Potash Intelligence</h1>
        <p>Interactive Geospatial Dashboard &middot; Maritimes Basin</p>
      </div>
    </div>
    <div id="quick-stats" class="quick-stats">
      <div class="stat"><span class="val">4</span><span class="lbl">Deposits</span></div>
      <div class="stat"><span class="val">20k+</span><span class="lbl">Hectares</span></div>
      <div class="stat"><span class="val">~52M</span><span class="lbl">Tonnes KCl</span></div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="app-container">
    
    <!-- Left Sidebar (Details Panel) -->
    <aside id="sidebar" class="sidebar hidden glass-panel">
      <div class="sidebar-header">
        <h2 id="sb-title">Location Details</h2>
        <button id="close-sidebar" class="icon-btn" title="Close Panel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div class="sidebar-content" id="sb-content">
        <!-- Dynamic content injected here -->
        <div class="empty-state">Select a marker on the map to view detailed analytics.</div>
      </div>
      
      <div class="chart-container" id="chart-wrapper" style="display:none;">
        <canvas id="capacityChart"></canvas>
      </div>
    </aside>

    <!-- Map Viewport -->
    <main class="map-wrapper">
      <div id="map"></div>
      
      <!-- Floating Controls -->
      <div class="floating-controls glass-panel">
        <h3>Layers</h3>
        <div class="layer-toggles">
          <label class="toggle-btn"><input type="checkbox" id="btn-deposits" checked> <span class="lbl-text"><span class="dot" style="background:var(--closed)"></span> Mines</span></label>
          <label class="toggle-btn"><input type="checkbox" id="btn-extents" checked> <span class="lbl-text"><span class="dash" style="border-color:#aaa"></span> Deposit Extents</span></label>
          <label class="toggle-btn"><input type="checkbox" id="btn-cities" checked> <span class="lbl-text"><span class="dot" style="background:var(--city)"></span> Cities</span></label>
          <label class="toggle-btn"><input type="checkbox" id="btn-district" checked> <span class="lbl-text"><span class="rect" style="border-color:var(--district)"></span> Potash District</span></label>
          <label class="toggle-btn"><input type="checkbox" id="btn-nb" checked> <span class="lbl-text"><span class="line" style="background:var(--nb-blue)"></span> NB Boundary</span></label>
        </div>
        <div class="action-buttons">
          <button id="btn-reset" class="action-btn">Reset View</button>
        </div>
      </div>

      <!-- Coordinate Tracker -->
      <div id="coord-display" class="glass-pill">Hover map for coordinates</div>
      <div id="nb-loading" class="glass-pill"><div class="spin"></div> Loading NB boundary...</div>
    </main>
    
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
